# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# Specific tweaks for Albert launcher.
#windowrule = move 40.7% 30%, match:title ^Albert$ # Position
windowrule = stay_focused on, match:title ^Albert$ # Focus
windowrule = float on, match:title ^Settings — Albert$ # Floating settings

# Specific tweaks for Gitify
windowrule = stay_focused on, match:class ^gitify$ # Focus
windowrule = no_initial_focus on, match:class ^gitify$ # No initial focus
windowrule = move 80% 5%, match:class ^gitify$ # Move

# Specific tweaks for Mega
windowrule = float on, match:class MEGAsync # Float

# Floating windows
windowrule = float on, match:class Electron
windowrule = float on, match:class org.telegram.desktop
windowrule = float on, match:class org.gnome.Calendar

# Pinned windows
windowrule = pin on, match:class org.telegram.desktop
windowrule = pin on, match:class geary

# -- Fix odd behaviors in IntelliJ IDEs --
#! Disable window flicker when autocomplete or tooltips appear
windowrule = no_focus on, match:class ^jetbrains-.*$, match:title ^win.*$, match:float 1
windowrule = no_initial_focus on, match:class ^jetbrains-.*$, match:float 1

# Godot - game/debug windows (initial_class is "Godot")
windowrule = float on, match:initial_class ^Godot$
windowrule = suppress_event maximize, match:initial_class ^Godot$
windowrule = no_anim on, match:initial_class ^Godot$
windowrule = no_blur on, match:initial_class ^Godot$
windowrule = render_unfocused on, match:initial_class ^Godot$

# Godot - editor window (initial_title is "Godot")
windowrule = suppress_event maximize, match:initial_title ^Godot$
windowrule = no_anim on, match:initial_title ^Godot$
windowrule = no_blur on, match:initial_title ^Godot$
windowrule = render_unfocused on, match:initial_title ^Godot$
